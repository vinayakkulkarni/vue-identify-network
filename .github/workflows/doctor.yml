name: 'Doctor'

on:
  workflow_call:
    secrets:
      DOCTOR_API_KEY:
        description: 'API key for pushing scores to app.the-doctor.report'
        required: false

permissions:
  contents: read

jobs:
  doctor:
    name: 'Vue Doctor'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Audit with vue-doctor
        uses: geoql/doctor-action@v2
        with:
          framework: vue
          preset: recommended
          threshold: ${{ vars.DOCTOR_THRESHOLD || '70' }}
          fail-on: error
          api-key: ${{ secrets.DOCTOR_API_KEY }}
          project: ${{ github.repository }}
          pr-comment: true
          comment-mode: both
